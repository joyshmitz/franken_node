name: Security Domain Golden Artifacts & Fuzzing

on:
  pull_request:
    paths:
      - 'crates/franken-node/src/security/**'
      - 'crates/franken-node/tests/golden_artifacts_comprehensive.rs'
      - 'tests/golden/**'
      - 'fuzz/**'
  push:
    branches: [main]
    paths:
      - 'crates/franken-node/src/security/**'
      - 'crates/franken-node/tests/golden_artifacts_comprehensive.rs'
      - 'tests/golden/**'
      - 'fuzz/**'

jobs:
  golden-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run golden artifacts tests (fail if mismatched)
        run: |
          echo "Running golden artifacts tests..."
          cargo test golden_artifacts_comprehensive --verbose

          echo "Checking for any uncommitted .golden files..."
          if git diff --name-only | grep -E '\.golden$'; then
            echo "ERROR: Found uncommitted .golden files after test run"
            echo "This indicates golden files were auto-generated during CI"
            echo "Golden files should be committed in advance, not generated in CI"
            echo "To fix: Run 'UPDATE_GOLDENS=1 cargo test golden_artifacts_comprehensive' locally"
            echo "Then commit the updated .golden files"
            exit 1
          fi

          echo "Verifying no .golden files were created..."
          if find tests/golden/ -name "*.golden" -newer . 2>/dev/null | head -1; then
            echo "ERROR: New .golden files were created during CI run"
            echo "Golden files must be committed in advance"
            exit 1
          fi

      - name: Run security regression tests
        run: |
          echo "Running security regression tests..."
          cargo test --test '' security::fuzz_regression

      - name: Validate golden artifacts coverage
        run: |
          echo "Validating golden test coverage..."
          cargo test --verbose golden_infrastructure_test
          cargo test --verbose golden_tests_require_update_goldens_env_for_creation

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-golden-test-evidence
          path: |
            target/debug/deps/
            tests/golden/
          retention-days: 7

  security-fuzzing:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: ${{ runner.os }}-fuzz-${{ hashFiles('fuzz/Cargo.lock') }}

      - name: Validate fuzz targets compile
        run: |
          echo "Validating fuzz targets compile correctly..."
          cd fuzz
          cargo check --bin fuzz_constant_time_comparison
          cargo check --bin fuzz_threshold_signature_verification
          cargo check --bin fuzz_epoch_key_derivation
          cargo check --bin fuzz_intent_firewall
          cargo check --bin fuzz_ssrf_policy

      - name: Run short fuzzing campaigns (CI validation)
        run: |
          echo "Running short fuzzing validation campaigns..."
          cd fuzz

          # Run each fuzzer for 30 seconds to validate they work
          timeout 30s cargo fuzz run fuzz_constant_time_comparison -- -max_total_time=25 || true
          timeout 30s cargo fuzz run fuzz_threshold_signature_verification -- -max_total_time=25 || true
          timeout 30s cargo fuzz run fuzz_epoch_key_derivation -- -max_total_time=25 || true
          timeout 30s cargo fuzz run fuzz_intent_firewall -- -max_total_time=25 || true
          timeout 30s cargo fuzz run fuzz_ssrf_policy -- -max_total_time=25 || true

      - name: Check for fuzzing crashes
        run: |
          echo "Checking for any fuzzing crashes..."
          if find fuzz/artifacts/ -name "crash-*" 2>/dev/null | head -1; then
            echo "ERROR: Fuzzing discovered crashes!"
            echo "Found crash artifacts:"
            find fuzz/artifacts/ -name "crash-*" || true
            echo "Run 'cargo fuzz tmin <target> <crash-file>' to minimize and debug"
            exit 1
          else
            echo "No crashes found during fuzzing validation"
          fi

      - name: Upload fuzzing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-fuzzing-evidence
          path: |
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 7

  security-integration:
    runs-on: ubuntu-latest
    needs: [golden-artifacts, security-fuzzing]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Run full security module tests
        run: |
          echo "Running comprehensive security module tests..."
          cargo test --verbose --test '' -- security::

      - name: Validate security hardening patterns
        run: |
          echo "Validating security hardening patterns are present..."

          # Check for constant-time comparison usage
          if ! grep -r "ct_eq\|ct_eq_bytes" crates/franken-node/src/security/ --include="*.rs"; then
            echo "WARNING: No constant-time comparisons found in security module"
          fi

          # Check for saturating arithmetic
          if ! grep -r "saturating_" crates/franken-node/src/security/ --include="*.rs"; then
            echo "WARNING: No saturating arithmetic found in security module"
          fi

          # Check for proper error handling
          if grep -r "unwrap()" crates/franken-node/src/security/ --include="*.rs"; then
            echo "WARNING: Found unwrap() calls in security module - consider proper error handling"
          fi

      - name: Security gate summary
        run: |
          echo "=== Security Domain CI Gate Summary ==="
          echo "✅ Golden artifacts tests passed (no mismatches)"
          echo "✅ Security fuzzing targets compile and run"
          echo "✅ Security regression tests passed"
          echo "✅ Security module integration tests passed"
          echo "🔒 Security domain validation complete"